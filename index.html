
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>🌿 学生端 | 光合作用增产思路提交</title>
    <script src="https://cdn.jsdelivr.net/npm/hydrogen-js-sdk@2.2.3/dist/Bmob-2.2.3.min.js"></script>
    <style>
        body { background: #f0f7ef; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); width: 100%; max-width: 500px; }
        h2 { color: #2b7a3e; border-left: 5px solid #2b7a3e; padding-left: 12px; margin-bottom: 20px; }
        .item { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; }
        input, textarea { width: 100%; border: 1.5px solid #cbe5c6; border-radius: 10px; padding: 10px; box-sizing: border-box; outline: none; }
        .btn { background: #2b7a3e; color: white; border: none; width: 100%; padding: 15px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🌿 提交增产方案</h2>
        <div class="item"><label>🏷️ 小组名称/编号</label><input type="text" id="groupName" placeholder="如：第一小组"></div>
        <div class="item"><label>🌾 原料调控 (CO₂/水)</label><textarea id="rawMaterial" rows="2"></textarea></div>
        <div class="item"><label>☀️ 条件调控 (光照/温度)</label><textarea id="condition" rows="2"></textarea></div>
        <div class="item"><label>🌿 空间优化 (光合面积)</label><textarea id="spatial" rows="2"></textarea></div>
        <div class="item"><label>✨ 其他创新思路</label><textarea id="other" rows="2"></textarea></div>
        <button class="btn" onclick="sendData()">🚀 提交完整方案</button>
    </div>

    <script>
        // 已为您填入密钥
        Bmob.initialize("82e391419403c960", "342815eb94da31f19ed7a90a8d051713");

        function sendData() {
            const group = document.getElementById('groupName').value.trim();
            if(!group) return alert("请填写小组名！");
            const query = Bmob.Query("PhotosynthesisTa");
            query.set("groupName", group);
            query.set("rawMaterial", document.getElementById('rawMaterial').value);
            query.set("condition", document.getElementById('condition').value);
            query.set("spatial", document.getElementById('spatial').value);
            query.set("other", document.getElementById('other').value);
            query.save().then(res => {
                alert("✅ 提交成功！");
                document.querySelectorAll('input, textarea').forEach(i => i.value = '');
            }).catch(err => {
                alert("❌ 提交失败，请确认Bmob表 PhotosynthesisTask 已创建。");
            });
        }
    </script>
</body>
</html>
